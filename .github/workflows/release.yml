name: Release kiosk binary

on:
  push:
    tags:
      - "v*"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "kiosk/**"

permissions:
  contents: write

jobs:
  build-kiosk:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: kiosk/src-tauri -> target

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: kiosk
          tagName: ${{ github.event_name == 'push' && github.ref_name || format('pr-{0}-{1}', github.event.pull_request.number, github.sha) }}
          releaseName: ${{ github.event_name == 'push' && github.ref_name || format('PR {0} build', github.event.pull_request.number) }}
          releaseBody: ${{ github.event_name == 'push' && 'Kiosk binary for stadium screens. Install the .msi or .exe on the target Windows machine.' || format('Pre-release kiosk build from PR {0}. For testing only.', github.event.pull_request.number) }}
          releaseDraft: false
          prerelease: ${{ github.event_name == 'pull_request' }}
